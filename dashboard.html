<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Allondra Mae Tabelon</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .dashboard-header h1 {
            color: var(--primary);
        }
        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            display: block;
        }
        .stat-card .label {
            color: var(--secondary);
            font-size: 0.95rem;
        }
        .messages-table {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .messages-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .messages-table th {
            background: var(--primary);
            color: var(--white);
            padding: 15px;
            text-align: left;
        }
        .messages-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .messages-table tr:hover {
            background: var(--light);
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-badge.unread {
            background: #FFE5E5;
            color: #CC0000;
        }
        .status-badge.read {
            background: #E5F5E5;
            color: #006600;
        }
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: var(--transition);
        }
        .delete-btn:hover {
            background: #c82333;
        }
        .mark-read-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
            transition: var(--transition);
        }
        .mark-read-btn:hover {
            background: var(--primary-dark);
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--secondary);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--primary-light);
        }
        .refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .refresh-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        @media (max-width: 600px) {
            .messages-table {
                overflow-x: auto;
            }
            .messages-table table {
                font-size: 0.85rem;
            }
            .messages-table th,
            .messages-table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-container">
            <h1 class="logo">&lt;Admin/&gt;</h1>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home"></i> Back to Portfolio</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-chart-line"></i> Admin Dashboard</h1>
            <button onclick="loadMessages()" class="refresh-btn">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <span class="number" id="totalMessages">0</span>
                <span class="label">Total Messages</span>
            </div>
            <div class="stat-card">
                <span class="number" id="unreadMessages">0</span>
                <span class="label">Unread Messages</span>
            </div>
            <div class="stat-card">
                <span class="number" id="readMessages">0</span>
                <span class="label">Read Messages</span>
            </div>
        </div>

        <!-- Messages -->
        <div class="messages-table" id="messagesContainer">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Message</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="messagesBody">
                    <tr>
                        <td colspan="7" class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>No messages yet</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
